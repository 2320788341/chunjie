<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>春节快乐</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(160deg, #8B0000 0%, #C41E1E 30%, #B22222 60%, #8B0000 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    overflow-x: hidden;
  }

  /* 背景装饰 */
  .bg-decor {
    position: fixed;
    pointer-events: none;
    z-index: 0;
  }
  .lantern-left, .lantern-right {
    position: fixed;
    top: 20px;
    font-size: 60px;
    animation: sway 3s ease-in-out infinite;
    z-index: 0;
  }
  .lantern-left  { left: 30px; animation-delay: 0s; }
  .lantern-right { right: 30px; animation-delay: 1.5s; }

  @keyframes sway {
    0%, 100% { transform: rotate(-5deg); }
    50%      { transform: rotate(5deg); }
  }

  /* 粒子 */
  .particle {
    position: fixed;
    pointer-events: none;
    z-index: 0;
    animation: fall linear infinite;
    opacity: 0.7;
    font-size: 20px;
  }
  @keyframes fall {
    0%   { transform: translateY(-120vh) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.8; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  /* 主卡片 */
  .card {
    position: relative;
    z-index: 1;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(10px);
    border-radius: 24px;
    padding: 50px 36px 40px;
    max-width: 380px;
    width: 90%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
    border: 1px solid rgba(255, 215, 0, 0.2);
  }

  .card h1 {
    font-size: 42px;
    color: #FFD700;
    margin-bottom: 28px;
    text-shadow: 0 2px 10px rgba(255, 215, 0, 0.4);
    letter-spacing: 6px;
  }

  /* 图片 */
  .card-img {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid rgba(255, 215, 0, 0.5);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    margin-bottom: 32px;
  }

  /* 祝福语列表 */
  .blessing-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-bottom: 36px;
  }

  .blessing-list li {
    color: #FFF8DC;
    font-size: 20px;
    letter-spacing: 2px;
    line-height: 1.8;
    opacity: 0;
    transform: translateY(24px);
    animation: fadeUp 1s ease forwards;
    animation-play-state: paused;
    text-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }

  .blessing-list li.show {
    animation-play-state: running;
  }

  @keyframes fadeUp {
    0%   { opacity: 0; transform: translateY(24px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .blessing-list li:nth-child(1) { animation-delay: 0.2s; }
  .blessing-list li:nth-child(2) { animation-delay: 0.9s; }
  .blessing-list li:nth-child(3) { animation-delay: 1.6s; }
  .blessing-list li:nth-child(4) { animation-delay: 2.3s; }
  .blessing-list li:nth-child(5) { animation-delay: 3.0s; }

  /* 分隔线 */
  .divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #FFD700, transparent);
    margin: 0 auto 32px;
  }

  /* 落款 */
  .signature {
    color: #FFD700;
    font-size: 20px;
    letter-spacing: 3px;
    opacity: 0;
    animation: fadeUp 1s ease 3.8s forwards;
    text-shadow: 0 1px 6px rgba(255, 215, 0, 0.3);
  }

  /* 音乐按钮 */
  .music-btn {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,215,0,0.4);
    border-radius: 30px;
    padding: 10px 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    color: #FFD700;
    font-size: 16px;
    font-family: inherit;
    letter-spacing: 2px;
    transition: all 0.3s ease;
    animation: pulse 2s ease-in-out infinite;
  }
  .music-btn:hover {
    background: rgba(0,0,0,0.6);
    border-color: #FFD700;
  }
  .music-btn.playing {
    border-color: rgba(255,215,0,0.7);
    animation: none;
    opacity: 0.7;
  }
  .music-btn.playing:hover {
    opacity: 1;
  }
  .music-icon {
    font-size: 22px;
  }
  .music-text {
    font-size: 14px;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 8px rgba(255,215,0,0.3); }
    50%      { box-shadow: 0 0 22px rgba(255,215,0,0.7); }
  }

  /* 底部年份 */
  .year-tag {
    margin-top: 28px;
    color: rgba(255,255,255,0.35);
    font-size: 13px;
    letter-spacing: 4px;
  }
</style>
</head>
<body>

<!-- 灯笼 -->
<div class="lantern-left">🏮</div>
<div class="lantern-right">🏮</div>

<!-- 金色粒子 -->
<div id="particles"></div>

<!-- 音乐按钮 -->
<button class="music-btn paused" id="musicBtn" onclick="toggleMusic()">
  <span class="music-icon">🎵</span>
  <span class="music-text">🎵 点我播放音乐</span>
</button>

<!-- 卡片 -->
<div class="card">
  <h1>🐴 新春大吉</h1>

  <img class="card-img" src="2222.png" alt="祝福图片">

  <ul class="blessing-list" id="blessingList">
    <li>辞旧迎新，万象更新<br>愿你在新的一年里<br><b>如意吉祥，福气满满</b></li>
    <li>愿你的事业<br>如骏马奔腾<br><b>一马当先，马到成功</b></li>
    <li>愿你的生活<br>如春风拂面<br><b>笑口常开，喜乐安康</b></li>
    <li>愿你的家人<br>团聚温馨<br><b>岁岁平安，阖家幸福</b></li>
    <li>🏮 恭祝<br><b>丙午马年 春节快乐！</b> 🏮</li>
  </ul>

  <div class="divider"></div>

  <div class="signature">—— 谢先生 敬上</div>

  <div class="year-tag">丙午年 · 2026</div>
</div>

<!-- 背景音乐 -->
<audio id="bgMusic" loop preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
  // === 音乐开关 ===
  const bgMusic = document.getElementById('bgMusic');
  const musicBtn = document.getElementById('musicBtn');

  function toggleMusic() {
    if (bgMusic.paused) {
      bgMusic.play().then(() => {
        musicBtn.classList.remove('paused');
        musicBtn.classList.add('playing');
        musicBtn.querySelector('.music-text').textContent = '🔊 音乐播放中';
      }).catch(() => {
        alert('请先点击页面任意位置，再点我播放音乐');
      });
    } else {
      bgMusic.pause();
      musicBtn.classList.remove('playing');
      musicBtn.classList.add('paused');
      musicBtn.querySelector('.music-text').textContent = '🎵 点我播放音乐';
    }
  }

  // 解决微信/移动端自动播放限制：用户首次点击页面时激活音频
  document.addEventListener('click', function initAudio() {
    if (bgMusic.paused && !musicBtn.classList.contains('playing')) {
      bgMusic.play().then(() => {
        bgMusic.pause();
        bgMusic.currentTime = 0;
      }).catch(() => {});
    }
  }, { once: false });

  // 逐条弹出
  const items = document.querySelectorAll('.blessing-list li');
  items.forEach((li, i) => {
    setTimeout(() => { li.classList.add('show'); }, i * 700);
  });

  // 金色粒子
  const emojis = ['✨','🌟','🧧','🍊','🎋','🪷'];
  const container = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const span = document.createElement('span');
    span.className = 'particle';
    span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    span.style.left = Math.random() * 100 + '%';
    span.style.animationDuration = (8 + Math.random() * 12) + 's';
    span.style.animationDelay = Math.random() * 10 + 's';
    span.style.fontSize = (14 + Math.random() * 18) + 'px';
    container.appendChild(span);
  }
</script>

</body>
</html>
